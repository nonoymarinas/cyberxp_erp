<cxp-modal
  class="modal-section"
  title=""
  [isOpen]="isOpen"
  [showIcon]="true"
  size="sm"
  [showFooter]="true"
  [closeOnOverlayClick]="false"
  [closeOnEscape]="true"
  (closed)="close()"
>
  <cxp-icon-lock-nav cxpModalIcon size="sm" fill="outline"></cxp-icon-lock-nav>
  <div class="forget-password-box">
    <label class="cxp-title cxp-title-lg">Forgot Password</label>
    
    <div class="section-box-item">
      <label class="section-label-email cxp-label cxp-label-md">Email Address</label>
      <cxp-input-text type="text" size="md" placeholder="email address"></cxp-input-text>
    </div>

    <cxp-button-login size="sm">Submit</cxp-button-login>
    <label class="cxp-label cxp-label-sm"
      >Please check email to update password after submission!</label
    >
  </div>

  <div cxpModalFooter class="modal-accept-decline-box">
    <div></div>
    <!-- <cxp-button size="md" variant="ghost" (click)="submit()">Submit</cxp-button> -->
  </div>
</cxp-modal>
