<div class="login-box">
  <div class="login-box__logo__box">
    <icon-cyberxp theme="dark" size="lg" fill="outline"></icon-cyberxp>
  </div>

  <div class="login-box__username__box">
    <label class="label-username" for="username">Username</label>
    <cxp-input theme="dark" size="xl" placeholder="username">
      <icon-user prefix theme="dark" fill="filled" size="xs"> </icon-user>
    </cxp-input>
  </div>
  <div class="login-box__password__box">
    <label class="label-password" for="password">Password</label>
    <cxp-input
      id="password"
      theme="dark"
      size="xl"
      placeholder="Password"
      [type]="passwordVisible ? 'text' : 'password'"
    >
      <icon-password prefix theme="dark" fill="filled" size="xs"></icon-password>

      <icon-eye
        suffix
        theme="dark"
        fill="outline"
        size="sm"
        [slashed]="passwordHidden"
        (click)="togglePasswordVisibility()"
      ></icon-eye>
    </cxp-input>
  </div>
  <div class="login-box__button__box">
    <button-login (clicked)="login()" theme="light" [disabled]="false">Sign-in</button-login>
  </div>
  <div class="login-box__create-forget__box">
    <a href="#" class="create-account-label">Create account?</a>
    <a href="#" class="forget-password-label">Forget password?</a>
  </div>
  <div class="login-box__agreement__box">
    <p class="agreement-notes-label">
      By signing in, you agree to our
      <a href="#" class="terms-policy-label" routerLink="/terms">Terms of Service</a>
      and
      <a href="#" class="terms-policy-label" routerLink="/privacy">Privacy Policy</a>.
    </p>
  </div>
</div>
