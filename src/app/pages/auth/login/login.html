<div class="login-box">
  <div class="login-box__logo__box">
    <icon-cyberxp class="icon-cyberxp icon-lg"></icon-cyberxp>
  </div>

  <div class="login-box__username__box">
    <label class="label-input" for="username">Username</label>
    <app-input type="text" id="username" name="username" placeholder="Enter your username"></app-input>
  </div>
  <div class="login-box__password__box">
    <label class="label-input" for="password">Password</label>
    <app-input type="password" id="password" name="password" placeholder="Enter your password"></app-input>
  </div>
  <div class="login-box__button__box">

  </div>
</div>
