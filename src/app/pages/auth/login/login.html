<div class="login-box">
  <div class="login-box__logo__box">
    <icon-cyberxp class=" icon-lg"></icon-cyberxp>
  </div>

  <div class="login-box__username__box">
    <label class="label-username" for="username">Username</label>
    <input-login type="text" id="username" name="username" placeholder="Enter your username"></input-login>
  </div>
  <div class="login-box__password__box">
    <label class="label-password" for="password">Password</label>
    <input-login type="password" id="password" name="password" placeholder="Enter your password"></input-login>
  </div>
  <div class="login-box__button__box">
    <button-login>Login</button-login>
  </div>
</div>
