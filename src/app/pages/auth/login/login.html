<main class="login-box">
  <form class="space-y-6" [formGroup]="this.form">
    <div class="login-box__logo__box">
      <cxp-icon-cyberxp-app size="lg" fill="outline"></cxp-icon-cyberxp-app>
    </div>

    <div class="login-box__username__box">
      <label class="label-username" for="username">Username</label>
      <cxp-input-text theme="dark" size="md" placeholder="username" formControlName="username">
        <!-- <icon-user prefix theme="dark" fill="filled" size="xs"> </icon-user> -->
      </cxp-input-text>
    </div>
    <div class="login-box__password__box">
      <label class="label-password" for="password">Password</label>
      <cxp-input-text id="password" theme="dark" size="md" placeholder="Password" formControlName="password"
        [type]="passwordVisible ? 'text' : 'password'">
        <!-- <icon-password prefix theme="dark" fill="filled" size="xs"></icon-password> -->

        <cxp-icon-eye-password suffix theme="dark" fill="outline" size="sm" [slashed]="passwordHidden"
          (click)="togglePasswordVisibility()"></cxp-icon-eye-password>
      </cxp-input-text>
    </div>
    <div class="login-box__button__box">
      <cxp-button-login (clicked)="signIn()" theme="light" [disabled]="false">

        @if (isSaving()) { <span class="loader-spinner h-[2em]"></span> } @else {
        Sign-in
        }

      </cxp-button-login>
    </div>
    <div class="login-box__create-forget__box">
      <a href="#" class="create-account-label">Create account?</a>
      <a routerLink="/forgot-password" class="forget-password-label">Forget password?</a>
    </div>
    <div class="login-box__agreement__box">
      <p class="agreement-notes-label">
        By signing in, you agree to our
        <a href="#" class="terms-policy-label" routerLink="/atms-terms-of-service">Terms of Service</a>
        and
        <a href="#" class="terms-policy-label" routerLink="/atms-privacy-policy">Privacy Policy</a>.
      </p>
    </div>
  </form>
</main>
