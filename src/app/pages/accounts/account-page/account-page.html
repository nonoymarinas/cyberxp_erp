<button (click)="toggleTheme()" class="theme-toogle">
    Toggle Theme
</button>

<section class="account-page__section">

    @if (!isEditingBasicInfo) {

        <ams-basic-info-view
            (edit)="editBasicInfo()">
        </ams-basic-info-view>

    } @else {

        <ams-basic-info-edit
            (save)="saveBasicInfo()"
            (cancel)="cancelBasicInfo()">
        </ams-basic-info-edit>
    }

</section>
