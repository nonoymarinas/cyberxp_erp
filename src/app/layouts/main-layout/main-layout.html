<div class="main-layout cxp-app-layout">
  <header class="main-layout__header cxp-header">
    <cxp-icon-burger-nav
      class="burger-menu"
      theme="dark"
      fill="outline"
      (click)="toggleSidebar()"
    ></cxp-icon-burger-nav>
    <cxp-icon-cyberxp-app class="cyberxp-logo" size="xs" fill="filled"></cxp-icon-cyberxp-app>
    <label class="module-name cxp-title cxp-title-md"
      >CXP-AMS <span class="module-name-span"> - Account Management System</span> v.10.1.0</label
    >
    <cxp-icon-app-nav class="icon-app-menu" size="md" fill="filled"></cxp-icon-app-nav>
    <cxp-icon-user-circle class="icon-user-nav" size="sm"></cxp-icon-user-circle>
  </header>
  <div class="main-layout__body">
    <div
      class="sidebar-overlay"
      [class.sidebar-overlay--show]="sidebarOpen"
      (click)="closeSidebar()"
    ></div>
    <aside
      class="main-layout__body__sidebar cxp-sidebar"
      [class.main-layout__body__sidebar--open]="sidebarOpen"
    >
      <!-- Logo -->
      <div class="sidebar__header cxp-sidebar__header">
        <img class="company-logo-img" src="assets/images/icons/spx-logo.png" alt="SPX Logo" />
      </div>

      <!-- Navigation -->
      <nav class="sidebar__menu">
        <a
          class="cxp-sidebar__item"
          routerLink="/app/home"
          routerLinkActive="cxp-sidebar__item--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <cxp-icon-home-nav class="cxp-sidebar__icon" size="xs" fill="filled"> </cxp-icon-home-nav>

          <span class="cxp-label cxp-label--xl cxp-sidebar__label"> Home </span>
        </a>

        <a
          class="cxp-sidebar__item"
          routerLink="/app/accounts"
          routerLinkActive="cxp-sidebar__item--active"
        >
          <cxp-icon-user-nav class="cxp-sidebar__icon" size="xs" fill="filled"> </cxp-icon-user-nav>

          <span class="cxp-label cxp-label--xl cxp-sidebar__label"> Accounts </span>
        </a>
      </nav>

      <!-- Bottom Section -->
      <div class="sidebar__footer">
        <a
          class="cxp-sidebar__item"
          routerLink="/app/settings"
          routerLinkActive="cxp-sidebar__item--active"
        >
          <cxp-icon-settings-nav
            class="icon icon--sm"
            size="xs"
            fill="filled"
          ></cxp-icon-settings-nav>
          <!-- <span class="sidebar__label__footer">Settings</span> -->
          <span class="cxp-label cxp-label--xl cxp-sidebar__label"> Settings </span>
        </a>
        <a
          class="cxp-sidebar__item"
          routerLink="/app/logouts"
          routerLinkActive="cxp-sidebar__item--active"
        >
          <cxp-icon-logout-nav class="icon icon--sm" fill="filled" size="xs"></cxp-icon-logout-nav>
          <!-- <span class="sidebar__label__footer">Sign-out</span> -->
          <span class="cxp-label cxp-label--xl cxp-sidebar__label"> Sign-out </span>
        </a>
      </div>
    </aside>
    <main class="main-layout__body__content">
      <router-outlet></router-outlet>
    </main>
  </div>
  <footer class="main-layout__footer cxp-footer">
    <label class="main-layout__footer__notes">© 2026 CyberXP ERP. All rights reserved.</label>
  </footer>
</div>
