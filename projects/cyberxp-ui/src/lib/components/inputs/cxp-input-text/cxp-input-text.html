<div
  class="input"
  [class.input--sm]="size === 'sm'"
  [class.input--md]="size === 'md'"
  [class.input--lg]="size === 'lg'"
  [class.input--xl]="size === 'xl'"
  [class.input--dark]="colorScheme === 'dark'"
  [class.input--light]="colorScheme === 'light'"
  [class.input--disabled]="disabled"
  [class.input--readonly]="readonly"
>
  <span class="input__prefix">
    <ng-content select="[prefix]"></ng-content>
  </span>

  <input
    class="input__field"
    [type]="inputType"
    [value]="value"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [readonly]="readonly"
    [required]="required"
    (input)="onInput($event)"
  />

  <span class="input__suffix">
    <ng-content select="[suffix]"></ng-content>
  </span>
</div>
