<span
  class="icon"
  [class.icon--dark]="theme === 'dark'"
  [class.icon--light]="theme === 'light'"
  [class.icon--xxs]="size === 'xxs'"
  [class.icon--xs]="size === 'xs'"
  [class.icon--sm]="size === 'sm'"
  [class.icon--md]="size === 'md'"
  [class.icon--lg]="size === 'lg'"
  [class.icon--xl]="size === 'xl'"
>
  <svg
    class="icon__svg"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    aria-hidden="true"
  >
    <circle
      class="icon__background"
      cx="12"
      cy="12"
      r="11.5"
    />

    <line x1="5" y1="8" x2="19" y2="8" />
    <line x1="5" y1="12" x2="19" y2="12" />
    <line x1="5" y1="16" x2="19" y2="16" />
  </svg>
</span>
