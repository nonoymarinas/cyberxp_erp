<span
  class="icon"
  [class.icon--dark]="theme === 'dark'"
  [class.icon--light]="theme === 'light'"
  [class.icon--xxs]="size === 'xxs'"
  [class.icon--xs]="size === 'xs'"
  [class.icon--sm]="size === 'sm'"
  [class.icon--md]="size === 'md'"
  [class.icon--lg]="size === 'lg'"
  [class.icon--xl]="size === 'xl'"
>
  <svg
    class="icon__svg"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 20.25 20.25"
    aria-hidden="true"
  >
    <circle class="icon__background" cx="10.12" cy="10.12" r="10" />

    <line  x1="4.51" y1="6.38" x2="15.74" y2="6.38" />
    <line  x1="4.51" y1="10.13" x2="15.74" y2="10.13" />
    <line  x1="4.51" y1="13.87" x2="15.74" y2="13.87" />
  </svg>
</span>
