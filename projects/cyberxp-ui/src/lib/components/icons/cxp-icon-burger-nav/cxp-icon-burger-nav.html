<span
  class="icon"
  [class.icon--xxs]="size === 'xxs'"
  [class.icon--xs]="size === 'xs'"
  [class.icon--sm]="size === 'sm'"
  [class.icon--md]="size === 'md'"
  [class.icon--lg]="size === 'lg'"
  [class.icon--xl]="size === 'xl'"
  [class.icon--active]="isIconActive"
>
  <svg
    class="icon__svg"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 20.25 20.25"
    aria-hidden="true"
    focusable="false"
  >
    <!-- Hover and active background -->
    <circle
      class="icon__background"
      cx="10.12"
      cy="10.12"
      r="10"
    />

    <!-- Burger lines -->
    <g class="icon__content">
      <line
        class="icon__line icon__line--top"
        x1="4.51"
        y1="6.38"
        x2="15.74"
        y2="6.38"
      />

      <line
        class="icon__line icon__line--middle"
        x1="4.51"
        y1="10.13"
        x2="15.74"
        y2="10.13"
      />

      <line
        class="icon__line icon__line--bottom"
        x1="4.51"
        y1="13.87"
        x2="15.74"
        y2="13.87"
      />
    </g>
  </svg>
</span>
